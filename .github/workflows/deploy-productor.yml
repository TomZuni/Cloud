name: Build and Deploy - ms-guias-productor

on:
  push:
    branches:
      - main
    paths:
      - "ms-productor/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-productor.yml"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/ms-guias-productor
  IMAGE_TAG: ${{ github.sha }}
  CONTAINER_NAME: ms-guias-productor

jobs:
  build-publish-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: ms-productor/pom.xml

      - name: Test
        working-directory: ms-productor
        run: mvn -B test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ms-productor
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Copiar docker-compose.yml (cluster RabbitMQ) a la EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.EC2_USER }}/ms-guias-productor"

      - name: Levantar cluster RabbitMQ en EC2 (idempotente, seguro de repetir desde el consumidor tambien)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script: |
            set -euo pipefail
            for p in 5672 15672 5673 15673; do
              ids=$(docker ps -aq --filter "publish=$p" || true)
              if [ -n "$ids" ]; then
                echo "Liberando puerto $p (contenedores: $ids)"
                docker rm -f $ids || true
              fi
            done
            cd ~/ms-guias-productor
            docker compose up -d

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_GUIDE_PREFIX: ${{ secrets.AWS_S3_GUIDE_PREFIX || 'guias' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          JWT_VALIDATION_ENABLED: ${{ secrets.JWT_VALIDATION_ENABLED || 'true' }}
          AZURE_AD_ISSUER_URI: ${{ secrets.AZURE_AD_ISSUER_URI }}
          AZURE_AD_JWK_SET_URI: ${{ secrets.AZURE_AD_JWK_SET_URI }}
          AZURE_AD_ALLOWED_AUDIENCES: ${{ secrets.AZURE_AD_ALLOWED_AUDIENCES }}
          AZURE_AD_ALLOWED_POLICIES: ${{ secrets.AZURE_AD_ALLOWED_POLICIES }}
          APP_SECURITY_DOWNLOAD_AUTHORITIES: ${{ secrets.APP_SECURITY_DOWNLOAD_AUTHORITIES || 'SCOPE_guides.download,ROLE_GUIDES_DOWNLOAD' }}
          APP_SECURITY_MANAGE_AUTHORITIES: ${{ secrets.APP_SECURITY_MANAGE_AUTHORITIES || 'SCOPE_guides.manage,SCOPE_access_as_user,SCOPE_user_impersonation,ROLE_GUIDES_MANAGE' }}
        run: |
          set -euo pipefail
          if [ "$JWT_VALIDATION_ENABLED" = "true" ]; then
            test -n "$AZURE_AD_ISSUER_URI" || { echo "AZURE_AD_ISSUER_URI is required when JWT_VALIDATION_ENABLED=true"; exit 1; }
            test -n "$AZURE_AD_ALLOWED_AUDIENCES" || { echo "AZURE_AD_ALLOWED_AUDIENCES is required when JWT_VALIDATION_ENABLED=true"; exit 1; }
          fi
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "mkdir -p ~/ms-guias-productor"
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "mkdir -p ~/guias-despacho-shared/data && chmod 777 ~/guias-despacho-shared/data"
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "mkdir -p ~/ms-guias-productor/efs && chmod 777 ~/ms-guias-productor/efs"
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "cat > ~/ms-guias-productor/app.env" <<EOF
          H2_DB_PATH=/data/guias_despacho
          DDL_AUTO=update
          PORT=8080
          AWS_REGION=${AWS_REGION}
          AWS_S3_BUCKET=${AWS_S3_BUCKET}
          AWS_S3_GUIDE_PREFIX=${AWS_S3_GUIDE_PREFIX}
          AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
          AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
          EFS_MOUNT_PATH=/mnt/efs
          RABBITMQ_HOST=rabbitmq1
          RABBITMQ_PORT=5672
          RABBITMQ_USERNAME=guest
          RABBITMQ_PASSWORD=guest
          JWT_VALIDATION_ENABLED=${JWT_VALIDATION_ENABLED}
          AZURE_AD_ISSUER_URI=${AZURE_AD_ISSUER_URI}
          AZURE_AD_JWK_SET_URI=${AZURE_AD_JWK_SET_URI}
          AZURE_AD_ALLOWED_AUDIENCES=${AZURE_AD_ALLOWED_AUDIENCES}
          AZURE_AD_ALLOWED_POLICIES=${AZURE_AD_ALLOWED_POLICIES}
          APP_SECURITY_DOWNLOAD_AUTHORITIES=${APP_SECURITY_DOWNLOAD_AUTHORITIES}
          APP_SECURITY_MANAGE_AUTHORITIES=${APP_SECURITY_MANAGE_AUTHORITIES}
          EOF
          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" <<EOF
          set -euo pipefail
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker pull "$IMAGE_REPOSITORY:$IMAGE_TAG"
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          for p in 8080; do
            ids=\$(docker ps -aq --filter "publish=\$p" || true)
            if [ -n "\$ids" ]; then
              echo "Liberando puerto \$p (contenedores: \$ids)"
              docker rm -f \$ids || true
            fi
          done
          docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            --network rabbitmq_net \
            --env-file ~/ms-guias-productor/app.env \
            -v ~/guias-despacho-shared/data:/data \
            -v ~/ms-guias-productor/efs:/mnt/efs \
            -p 8080:8080 \
            "$IMAGE_REPOSITORY:$IMAGE_TAG"
          docker image prune -f
          EOF

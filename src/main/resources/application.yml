server:
  port: ${PORT:8080}

spring:
  application:
    name: course-enrollment-api
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:oracle}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        jdbc:
          time_zone: UTC

aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${AWS_S3_BUCKET:course-enrollment-summaries}
    summary-prefix: ${AWS_S3_SUMMARY_PREFIX:inscripciones}

dispatch-guides:
  efs-path: ${EFS_MOUNT_PATH:/mnt/efs}/dispatch-guides
  s3-prefix: ${AWS_S3_GUIDE_PREFIX:guias}

app:
  security:
    jwt-validation-enabled: ${JWT_VALIDATION_ENABLED:false}
    issuer-uri: "${AZURE_AD_ISSUER_URI:}"
    jwk-set-uri: "${AZURE_AD_JWK_SET_URI:}"
    allowed-audiences: "${AZURE_AD_ALLOWED_AUDIENCES:${AZURE_AD_AUDIENCE:}}"
    allowed-policies: "${AZURE_AD_ALLOWED_POLICIES:}"
    download-authorities: "${APP_SECURITY_DOWNLOAD_AUTHORITIES:SCOPE_guides.download,ROLE_GUIDES_DOWNLOAD}"
    manage-authorities: "${APP_SECURITY_MANAGE_AUTHORITIES:SCOPE_guides.manage,SCOPE_access_as_user,SCOPE_user_impersonation,ROLE_GUIDES_MANAGE}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
